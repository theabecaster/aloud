name: eval

# Transcription-accuracy regression gate. Downloads the (~500 MB, cached)
# model and runs eval/run-eval.sh against synthesized fixtures. Runs when
# transcription code or the engine pin changes, nightly, and on demand.
on:
  pull_request:
    paths:
      - 'Sources/Aloud/Transcription/**'
      - 'Package.swift'
      - 'Package.resolved'
      - 'eval/**'
  schedule:
    - cron: '17 9 * * *'   # nightly
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Same SDK-26 requirement as build.yml (macOS 26 APIs behind
      # availability guards).
      - name: Select newest Xcode 26
        run: |
          XCODE="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)"
          test -n "$XCODE" || { echo "no Xcode 26 on runner"; ls /Applications | grep Xcode; exit 1; }
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Cache speech model
        uses: actions/cache@v4
        with:
          path: ~/Library/Application Support/FluidAudio/Models
          key: asr-model-${{ hashFiles('Package.resolved') }}
          restore-keys: asr-model-

      - name: Build
        run: swift build -c release

      - name: Run evals
        run: bash eval/run-eval.sh

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: eval/results/report.json
